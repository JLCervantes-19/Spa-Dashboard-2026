<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes — Serenità Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">

    <header class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">Clientes</h1>
        <p class="page-subtitle">Base de datos de clientas</p>
      </div>
    </header>

    <div class="page-body">
      <div class="card">
        <div class="filters-bar">
          <div class="search-input-wrapper">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="buscar-cliente" class="form-input" placeholder="Buscar por nombre, email o teléfono…" />
          </div>
          <select id="filtro-tipo-cli" class="filter-select">
            <option value="">Todos</option>
            <option value="recurrente">Recurrentes (2+ citas)</option>
            <option value="nuevo">Nuevas (1 cita)</option>
          </select>
          <span id="total-clientes" class="text-muted" style="font-size:0.78rem;margin-left:auto"></span>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Total citas</th>
                <th>Última visita</th>
                <th>Desde</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="clientes-tbody">
              <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
        <div id="clientes-pag" class="pagination">
          <span id="cli-pag-info" class="text-muted"></span>
          <div class="pagination-controls" id="cli-pag-controls"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL DETALLE CLIENTE -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div>
        <p class="modal-title" id="cli-titulo">Detalle de cliente</p>
      </div>
      <button class="modal-close" id="modal-cli-close">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
        <div id="cli-avatar"></div>
        <div>
          <h2 id="cli-nombre" style="font-family:var(--font-display);font-size:1.35rem;font-weight:300;color:var(--text-secondary)"></h2>
          <p id="cli-email-display" style="font-size:0.82rem;color:var(--text-muted)"></p>
        </div>
      </div>

      <div class="detail-grid mb-16">
        <div class="detail-item"><div class="detail-label">Teléfono</div><div class="detail-value" id="cli-tel"></div></div>
        <div class="detail-item"><div class="detail-label">Documento</div><div class="detail-value" id="cli-doc"></div></div>
        <div class="detail-item"><div class="detail-label">Fecha nacimiento</div><div class="detail-value" id="cli-nac"></div></div>
        <div class="detail-item"><div class="detail-label">Registrada</div><div class="detail-value" id="cli-reg"></div></div>
        <div class="detail-item"><div class="detail-label">Alergias</div><div class="detail-value" id="cli-alergias" style="font-weight:400"></div></div>
        <div class="detail-item"><div class="detail-label">Origen</div><div class="detail-value" id="cli-origen"></div></div>
      </div>

      <!-- Notas internas -->
      <div class="form-group">
        <label class="form-label">Notas internas (solo admin)</label>
        <textarea id="cli-notas-input" class="form-textarea" rows="3" placeholder="Observaciones internas…" maxlength="1000"></textarea>
      </div>
      <button class="btn btn-secondary btn-sm" id="btn-guardar-nota-cli" style="margin-bottom:16px">Guardar nota</button>

      <div class="divider"></div>
      <h3 style="font-size:0.88rem;font-weight:500;color:var(--text-secondary);margin:16px 0 12px">Historial de reservas</h3>
      <div class="table-wrapper">
        <table class="data-table">
          <thead><tr><th>Fecha</th><th>Servicio</th><th>Empleada</th><th>Estado</th></tr></thead>
          <tbody id="cli-historial-tbody"><tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-muted)">Cargando…</td></tr></tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-cli-close2">Cerrar</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAdmin }  from '/js/auth.js'
  import { supabase }      from '/js/supabase-client.js'
  import { getSidebarHTML, initSidebar } from '/js/sidebar.js'
  import {
    avatarHTML, badgeCita, formatFechaCorta, formatHora, toast,
    openModal, closeModal, renderSidebarUser, debounce
  } from '/js/utils.js'

  const auth = await requireAdmin()
  if (!auth) throw new Error()
  document.getElementById('sidebar').innerHTML = getSidebarHTML('/clientes.html')
  initSidebar(auth.admin)
  renderSidebarUser(auth.admin)

  let clientesAll = []
  let citasPorCliente = {}
  let currentPage = 1
  const PAGE_SIZE = 25
  let clienteActualId = null

  async function cargarDatos() {
    const { data: clientes } = await supabase
      .from('clientes')
      .select('*')
      .order('fecha_registro', { ascending: false })

    const { data: citas } = await supabase
      .from('citas')
      .select('id,cliente_id,fecha,estado,servicios(nombre),empleados(nombre,apellido)')
      .order('fecha', { ascending: false })

    clientesAll = clientes || []
    citasPorCliente = {}
    ;(citas || []).forEach(c => {
      if (!citasPorCliente[c.cliente_id]) citasPorCliente[c.cliente_id] = []
      citasPorCliente[c.cliente_id].push(c)
    })

    document.getElementById('total-clientes').textContent = `${clientesAll.length} clientas registradas`
    aplicarFiltros()
  }

  let busqueda = '', filtroTipo = ''

  function aplicarFiltros() {
    let arr = clientesAll.filter(c => {
      const texto = [c.nombre, c.email, c.telefono].join(' ').toLowerCase()
      if (busqueda && !texto.includes(busqueda.toLowerCase())) return false
      const total = (citasPorCliente[c.id] || []).length
      if (filtroTipo === 'recurrente' && total < 2) return false
      if (filtroTipo === 'nuevo' && total !== 1) return false
      return true
    })
    currentPage = 1
    renderTabla(arr)
  }

  document.getElementById('buscar-cliente').addEventListener('input', debounce(e => { busqueda = e.target.value; aplicarFiltros() }))
  document.getElementById('filtro-tipo-cli').addEventListener('change', e => { filtroTipo = e.target.value; aplicarFiltros() })

  function renderTabla(arr) {
    const tbody = document.getElementById('clientes-tbody')
    const total = arr.length
    const start = (currentPage - 1) * PAGE_SIZE
    const page  = arr.slice(start, start + PAGE_SIZE)
    document.getElementById('cli-pag-info').textContent = `${total} resultado${total !== 1 ? 's' : ''}`

    if (!page.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon"><svg width="28" height="28" fill="none" stroke="var(--lilac)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><p class="empty-state-title">Sin clientas</p><p class="empty-state-text">No se encontraron resultados</p></div></td></tr>`
      document.getElementById('cli-pag-controls').innerHTML = ''
      return
    }

    tbody.innerHTML = page.map(c => {
      const historial = citasPorCliente[c.id] || []
      const ultima = historial[0]?.fecha
      return `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              ${avatarHTML(c.nombre, '', null, 32)}
              <span style="font-weight:500">${c.nombre}</span>
            </div>
          </td>
          <td class="td-muted">${c.email || '—'}</td>
          <td class="td-muted">${c.telefono || '—'}</td>
          <td style="font-weight:500;text-align:center">${historial.length}</td>
          <td class="td-muted">${ultima ? formatFechaCorta(ultima) : '—'}</td>
          <td class="td-muted">${c.fecha_registro ? formatFechaCorta(c.fecha_registro.split('T')[0]) : '—'}</td>
          <td>
            <div class="table-actions">
              <button class="action-btn" data-tooltip="Ver detalle" onclick="verDetalle('${c.id}')">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
              <button class="action-btn" data-tooltip="Agregar nota" onclick="agregarNota('${c.id}')">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              </button>
            </div>
          </td>
        </tr>
      `
    }).join('')

    // Paginación
    const totalPages = Math.ceil(total / PAGE_SIZE)
    const pag = document.getElementById('cli-pag-controls')
    if (totalPages <= 1) { pag.innerHTML = ''; return }
    let pagHtml = `<button class="page-btn" ${currentPage===1?'disabled':''} onclick="changePage(${currentPage-1})">‹</button>`
    for (let i = 1; i <= totalPages; i++) {
      if (totalPages <= 7 || Math.abs(i - currentPage) <= 2 || i === 1 || i === totalPages) {
        pagHtml += `<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`
      } else if (Math.abs(i - currentPage) === 3) {
        pagHtml += `<span style="padding:0 4px;color:var(--text-muted)">…</span>`
      }
    }
    pagHtml += `<button class="page-btn" ${currentPage===totalPages?'disabled':''} onclick="changePage(${currentPage+1})">›</button>`
    pag.innerHTML = pagHtml
  }

  window.changePage = (p) => {
    currentPage = p
    const arr = clientesAll.filter(c => {
      const texto = [c.nombre, c.email, c.telefono].join(' ').toLowerCase()
      if (busqueda && !texto.includes(busqueda.toLowerCase())) return false
      const total = (citasPorCliente[c.id] || []).length
      if (filtroTipo === 'recurrente' && total < 2) return false
      if (filtroTipo === 'nuevo' && total !== 1) return false
      return true
    })
    renderTabla(arr)
    window.scrollTo({ top: 0, behavior: 'smooth' })
  }

  window.verDetalle = (id) => {
    const c = clientesAll.find(x => x.id === id)
    if (!c) return
    clienteActualId = id
    document.getElementById('cli-titulo').textContent = c.nombre
    document.getElementById('cli-avatar').innerHTML   = avatarHTML(c.nombre, '', null, 52)
    document.getElementById('cli-nombre').textContent = c.nombre
    document.getElementById('cli-email-display').textContent = c.email || '—'
    document.getElementById('cli-tel').textContent    = c.telefono || '—'
    document.getElementById('cli-doc').textContent    = c.documento || '—'
    document.getElementById('cli-nac').textContent    = c.fecha_nacimiento || '—'
    document.getElementById('cli-reg').textContent    = c.fecha_registro ? new Date(c.fecha_registro).toLocaleDateString('es-CO') : '—'
    document.getElementById('cli-alergias').textContent = c.alergias || 'Sin alergias registradas'
    document.getElementById('cli-origen').textContent  = c.origen || '—'
    document.getElementById('cli-notas-input').value   = c.notas || ''

    const historial = citasPorCliente[id] || []
    const tbody = document.getElementById('cli-historial-tbody')
    if (!historial.length) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-muted)">Sin citas registradas</td></tr>`
    } else {
      tbody.innerHTML = historial.map(h => `
        <tr>
          <td>${formatFechaCorta(h.fecha)}</td>
          <td>${h.servicios?.nombre || '—'}</td>
          <td>${h.empleados ? [h.empleados.nombre, h.empleados.apellido].filter(Boolean).join(' ') : '—'}</td>
          <td>${badgeCita(h.estado)}</td>
        </tr>
      `).join('')
    }
    openModal('modal-cliente')
  }

  window.agregarNota = (id) => {
    window.verDetalle(id)
    setTimeout(() => document.getElementById('cli-notas-input').focus(), 300)
  }

  document.getElementById('btn-guardar-nota-cli').addEventListener('click', async () => {
    const nota = document.getElementById('cli-notas-input').value.trim()
    const { error } = await supabase.from('clientes').update({ notas: nota }).eq('id', clienteActualId)
    if (error) { toast('Error al guardar nota', 'error'); return }
    const idx = clientesAll.findIndex(c => c.id === clienteActualId)
    if (idx !== -1) clientesAll[idx].notas = nota
    toast('Nota guardada', 'success')
  })

  ;['modal-cli-close','modal-cli-close2'].forEach(id => document.getElementById(id).addEventListener('click', () => closeModal('modal-cliente')))
  document.getElementById('modal-cliente').addEventListener('click', e => { if (e.target.id === 'modal-cliente') closeModal('modal-cliente') })

  await cargarDatos()
</script>
</body>
</html>
