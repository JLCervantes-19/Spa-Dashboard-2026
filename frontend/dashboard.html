<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Serenità Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    /* Filtro de período */
    .periodo-filter {
      display: inline-flex;
      background: var(--hover-bg, #f6f2f9);
      border: 1px solid var(--card-border, #e9e2ef);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
    }
    .periodo-filter button {
      border: none;
      background: transparent;
      padding: 7px 16px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted, #8a7f93);
      cursor: pointer;
      transition: all 0.15s;
    }
    .periodo-filter button.active {
      background: #fff;
      color: var(--purple-dark, #522566);
      box-shadow: 0 1px 4px rgba(82, 37, 102, 0.12);
    }
    /* Tarjetas KPI */
    .kpi-card { position: relative; }
    .kpi-meta {
      font-size: 0.72rem;
      color: var(--text-muted, #8a7f93);
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .kpi-meta .dot-sep { opacity: 0.4; }
    .kpi-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 12px 12px 0 0;
    }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <header class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle" id="fecha-hoy"></p>
      </div>
      <div class="page-header-right" style="display:flex;align-items:center;gap:14px">
        <div class="periodo-filter" id="periodo-filter">
          <button data-periodo="dia" class="active">Día</button>
          <button data-periodo="semana">Semana</button>
          <button data-periodo="mes">Mes</button>
          <button data-periodo="ano">Año</button>
        </div>
        <a href="/reservas.html" class="btn btn-primary btn-sm">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nueva reserva
        </a>
      </div>
    </header>

    <div class="page-body">

      <!-- KPI GRID -->
      <div class="kpi-grid" id="kpi-grid">
        <div class="kpi-card skeleton" style="height:110px"></div>
        <div class="kpi-card skeleton" style="height:110px"></div>
        <div class="kpi-card skeleton" style="height:110px"></div>
        <div class="kpi-card skeleton" style="height:110px"></div>
        <div class="kpi-card skeleton" style="height:110px"></div>
        <div class="kpi-card skeleton" style="height:110px"></div>
      </div>

      <!-- GRÁFICOS FILA 1 -->
      <div class="charts-row mb-24" id="charts-row-1">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Reservas últimos 30 días</span>
          </div>
          <div class="card-body">
            <div class="chart-container" style="height:220px">
              <canvas id="chart-reservas-dias"></canvas>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title" id="titulo-chart-estados">Distribución de estados</span>
          </div>
          <div class="card-body" style="display:flex;align-items:center;justify-content:center">
            <div class="chart-container" style="height:220px;max-width:220px">
              <canvas id="chart-estados"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- GRÁFICOS FILA 2 -->
      <div class="charts-row mb-24">
        <div class="card">
          <div class="card-header">
            <span class="card-title" id="titulo-chart-servicios">Servicios más solicitados</span>
          </div>
          <div class="card-body">
            <div class="chart-container" style="height:200px">
              <canvas id="chart-servicios"></canvas>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title" id="titulo-chart-empleadas">Citas por empleada</span>
          </div>
          <div class="card-body">
            <div class="chart-container" style="height:200px">
              <canvas id="chart-empleadas"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- CITAS HOY -->
      <div class="card mb-24">
        <div class="card-header">
          <span class="card-title">Citas de hoy</span>
          <div style="display:flex;gap:8px">
            <select id="filtro-empleada-hoy" class="filter-select">
              <option value="">Todas las empleadas</option>
            </select>
            <select id="filtro-estado-hoy" class="filter-select">
              <option value="">Todos los estados</option>
              <option value="pendiente">Pendiente</option>
              <option value="confirmada">Confirmada</option>
              <option value="completada">Completada</option>
              <option value="no_asistio">No asistió</option>
              <option value="cancelada_cliente">Cancelada (cliente)</option>
              <option value="cancelada_admin">Cancelada (admin)</option>
            </select>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Hora</th>
                <th>Cliente</th>
                <th>Servicio</th>
                <th>Empleada</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="citas-hoy-tbody">
              <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted)">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- PRÓXIMAS CITAS -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Próximas citas (7 días)</span>
          <a href="/reservas.html" class="btn btn-ghost btn-sm">Ver todas →</a>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Cliente</th>
                <th>Servicio</th>
                <th>Empleada</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="agenda-semana-tbody">
              <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted)">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /page-body -->
  </div><!-- /main-content -->
</div>

<!-- MODAL CAMBIAR ESTADO -->
<div class="modal-overlay" id="modal-estado">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div>
        <p class="modal-title">Cambiar estado</p>
        <p class="modal-subtitle" id="modal-estado-nombre"></p>
      </div>
      <button class="modal-close" id="modal-estado-close">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Estado</label>
        <select id="select-nuevo-estado" class="form-select">
          <option value="pendiente">Pendiente</option>
          <option value="confirmada">Confirmada</option>
          <option value="completada">Completada</option>
          <option value="no_asistio">No asistió</option>
          <option value="cancelada_cliente">Cancelada (cliente)</option>
          <option value="cancelada_admin">Cancelada (admin)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Nota (opcional)</label>
        <textarea id="nota-estado" class="form-textarea" rows="2" placeholder="Agrega una nota…" maxlength="500"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-estado-cancel">Cancelar</button>
      <button class="btn btn-primary" id="modal-estado-save">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAdmin }    from '/js/auth.js'
  import { supabase }        from '/js/supabase-client.js'
  import { getSidebarHTML, initSidebar } from '/js/sidebar.js'
  import {
    formatHora, formatFechaCorta, todayISO, rangoPeriodo, ESTADOS_INACTIVOS,
    badgeCita, avatarHTML, toast, openModal, closeModal, renderSidebarUser
  } from '/js/utils.js'

  // ——— Iconos ————————————————————————————————————————————
  const calIco   = `<svg width="18" height="18" fill="none" stroke="var(--purple-dark)" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`
  const moneyIco = `<svg width="18" height="18" fill="none" stroke="var(--purple-dark)" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`
  const checkIco = `<svg width="18" height="18" fill="none" stroke="var(--purple-dark)" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`
  const userIco  = `<svg width="18" height="18" fill="none" stroke="var(--purple-dark)" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>`
  const xIco     = `<svg width="18" height="18" fill="none" stroke="var(--purple-dark)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`
  const alertIco = `<svg width="18" height="18" fill="none" stroke="var(--purple-dark)" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`

  // ——— Auth guard ————————————————————————————————————————
  const auth = await requireAdmin()
  if (!auth) throw new Error()

  document.getElementById('sidebar').innerHTML = getSidebarHTML('/dashboard.html')
  initSidebar(auth.admin)
  renderSidebarUser(auth.admin)

  document.getElementById('fecha-hoy').textContent =
    new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Bogota' }))
      .toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })

  const PERIODO_LABEL = { dia: 'hoy', semana: 'esta semana', mes: 'este mes', ano: 'este año' }
  let periodoActual = 'dia'
  const charts = {}   // instancias Chart.js por canvas, para destruir al refrescar

  // ——— KPI helper ————————————————————————————————————————
  function kpiCard(label, val, meta, icon, accentColor) {
    return `
      <div class="kpi-card">
        ${accentColor ? `<div class="kpi-accent" style="background:${accentColor}"></div>` : ''}
        <div class="kpi-label">${label}</div>
        <div class="kpi-value">${val}</div>
        <div class="kpi-meta">${meta || ''}</div>
        <div class="kpi-icon">${icon}</div>
      </div>
    `
  }

  function renderChart(canvasId, config) {
    if (charts[canvasId]) charts[canvasId].destroy()
    charts[canvasId] = new Chart(document.getElementById(canvasId), config)
  }

  // ——— Carga y render del período seleccionado ————————————
  async function cargarPeriodo() {
    const [desde, hasta] = rangoPeriodo(periodoActual)
    const etiqueta = PERIODO_LABEL[periodoActual]

    let citas = []
    try {
      const { data, error } = await supabase.from('citas')
        .select('id,fecha,hora_inicio,estado,cliente_id,empleado_id,servicios(nombre,precio),empleados(nombre,apellido)')
        .gte('fecha', desde).lte('fecha', hasta)
        .order('fecha').order('hora_inicio')
      if (error) throw error
      citas = data || []
    } catch (err) {
      console.error('Dashboard — error al cargar período:', err)
      document.getElementById('kpi-grid').innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--danger)">
          Error al cargar datos.
          <button onclick="location.reload()" style="margin-left:8px;padding:6px 14px;border-radius:6px;background:var(--danger);color:#fff;border:none;cursor:pointer;font-size:0.78rem">Reintentar</button>
        </div>`
      return
    }

    // ——— KPIs ———
    const canceladasCli = citas.filter(c => c.estado === 'cancelada_cliente').length
    const canceladasAdm = citas.filter(c => c.estado === 'cancelada_admin').length
    const canceladas    = canceladasCli + canceladasAdm
    const noAsistio     = citas.filter(c => c.estado === 'no_asistio').length
    const completadas   = citas.filter(c => c.estado === 'completada').length
    const confirmadas   = citas.filter(c => c.estado === 'confirmada').length
    const pendientes    = citas.filter(c => c.estado === 'pendiente').length
    const activas       = citas.filter(c => !ESTADOS_INACTIVOS.includes(c.estado))
    const totalActivas  = activas.length

    const ingresos       = citas.filter(c => c.estado === 'completada')
                                .reduce((s, c) => s + (c.servicios?.precio || 0), 0)
    const clientesUnicos = new Set(activas.map(c => c.cliente_id).filter(Boolean)).size
    const cerradas       = completadas + noAsistio
    const tasaAsist      = cerradas > 0 ? Math.round((completadas / cerradas) * 100) : null
    const sinAsignar     = activas.filter(c => !c.empleado_id).length

    document.getElementById('kpi-grid').innerHTML = `
      ${kpiCard(`Citas ${etiqueta}`, totalActivas,
        `${confirmadas} confirmada${confirmadas !== 1 ? 's' : ''}<span class="dot-sep">·</span>${pendientes} pendiente${pendientes !== 1 ? 's' : ''}`,
        calIco, 'var(--purple-medium, #7A3A8E)')}
      ${kpiCard('Completadas', completadas,
        tasaAsist === null ? 'Sin citas cerradas aún' : `${tasaAsist}% de asistencia`,
        checkIco, '#16a34a')}
      ${kpiCard(`Ingresos ${etiqueta}`, '$' + ingresos.toLocaleString('es-CO'),
        'De citas completadas', moneyIco, '#C9A961')}
      ${kpiCard('Clientes únicos', clientesUnicos,
        `Con cita activa ${etiqueta}`, userIco, '#2563eb')}
      ${kpiCard('Canceladas', canceladas,
        `${canceladasCli} cliente<span class="dot-sep">·</span>${canceladasAdm} admin`,
        xIco, '#64748b')}
      ${kpiCard('No asistió', noAsistio,
        totalActivas + cerradas > 0 ? `${Math.round((noAsistio / Math.max(citas.length, 1)) * 100)}% del período` : '',
        alertIco, '#dc2626')}
      ${sinAsignar > 0 ? `
      <div class="kpi-card" style="border:1px solid var(--danger);background:rgba(239,68,68,0.05)">
        <div class="kpi-label" style="color:var(--danger)">⚠ Sin asignar ${etiqueta}</div>
        <div class="kpi-value" style="color:var(--danger)">${sinAsignar}</div>
        <div class="kpi-meta"><a href="/reservas.html" style="color:var(--danger);text-decoration:underline">Asignar empleada →</a></div>
      </div>` : ''}
    `

    // ——— Gráficos del período ———
    document.getElementById('titulo-chart-estados').textContent   = `Estados (${etiqueta})`
    document.getElementById('titulo-chart-servicios').textContent = `Servicios más solicitados (${etiqueta})`
    document.getElementById('titulo-chart-empleadas').textContent = `Citas por empleada (${etiqueta})`

    const ESTADO_COLOR = {
      'Pendiente': '#AD74C3', 'Confirmada': '#2563eb', 'Completada': '#16a34a',
      'No asistió': '#dc2626', 'Cancelada (cliente)': '#ea580c', 'Cancelada (admin)': '#64748b',
    }
    const ESTADO_LABEL = {
      pendiente: 'Pendiente', confirmada: 'Confirmada', completada: 'Completada',
      no_asistio: 'No asistió', cancelada_cliente: 'Cancelada (cliente)', cancelada_admin: 'Cancelada (admin)',
    }
    const estadosCont = {}
    citas.forEach(c => {
      const l = ESTADO_LABEL[c.estado] || c.estado
      estadosCont[l] = (estadosCont[l] || 0) + 1
    })
    renderChart('chart-estados', {
      type: 'doughnut',
      data: {
        labels: Object.keys(estadosCont),
        datasets: [{
          data: Object.values(estadosCont),
          backgroundColor: Object.keys(estadosCont).map(l => ESTADO_COLOR[l] || '#9ca3af'),
          borderWidth: 2, borderColor: '#fff',
        }],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, padding: 8 } } }, cutout: '65%' }
    })

    const servCont = {}
    citas.forEach(c => {
      const n = c.servicios?.nombre || 'Sin servicio'
      servCont[n] = (servCont[n] || 0) + 1
    })
    const sorted = Object.entries(servCont).sort((a, b) => b[1] - a[1]).slice(0, 6)
    renderChart('chart-servicios', {
      type: 'bar',
      data: { labels: sorted.map(s => s[0]), datasets: [{ data: sorted.map(s => s[1]), backgroundColor: 'rgba(122,58,142,0.7)', borderRadius: 4 }] },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 10 }, precision: 0 }, grid: { color: 'rgba(82,37,102,0.06)' } }, y: { ticks: { font: { size: 10 } }, grid: { display: false } } } }
    })

    const empCont = {}
    activas.forEach(c => {
      const n = c.empleados ? [c.empleados.nombre, c.empleados.apellido].filter(Boolean).join(' ') : 'Sin asignar'
      empCont[n] = (empCont[n] || 0) + 1
    })
    renderChart('chart-empleadas', {
      type: 'bar',
      data: { labels: Object.keys(empCont), datasets: [{ data: Object.values(empCont), backgroundColor: 'rgba(82,37,102,0.65)', borderRadius: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 10 } }, grid: { display: false } }, y: { ticks: { font: { size: 10 }, precision: 0 }, grid: { color: 'rgba(82,37,102,0.06)' }, beginAtZero: true } } }
    })
  }

  // ——— Gráfico fijo: reservas últimos 30 días ———————————————
  async function cargarChart30Dias() {
    const hoy = todayISO()
    const hace30 = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Bogota' }))
    hace30.setDate(hace30.getDate() - 30)
    const desde = `${hace30.getFullYear()}-${String(hace30.getMonth() + 1).padStart(2, '0')}-${String(hace30.getDate()).padStart(2, '0')}`

    const { data } = await supabase.from('citas').select('fecha').gte('fecha', desde).lte('fecha', hoy)
    const fechaConteo = {}
    ;(data || []).forEach(c => { fechaConteo[c.fecha] = (fechaConteo[c.fecha] || 0) + 1 })

    const labels30 = [], vals30 = []
    const cursor = new Date(hace30)
    for (let i = 0; i <= 30; i++) {
      const f = `${cursor.getFullYear()}-${String(cursor.getMonth() + 1).padStart(2, '0')}-${String(cursor.getDate()).padStart(2, '0')}`
      labels30.push(cursor.toLocaleDateString('es-CO', { day: 'numeric', month: 'short' }))
      vals30.push(fechaConteo[f] || 0)
      cursor.setDate(cursor.getDate() + 1)
    }

    renderChart('chart-reservas-dias', {
      type: 'line',
      data: { labels: labels30, datasets: [{ label: 'Reservas', data: vals30, borderColor: '#7A3A8E', backgroundColor: 'rgba(122,58,142,0.08)', borderWidth: 2, tension: 0.4, pointRadius: 0, fill: true }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { maxTicksLimit: 8, font: { size: 10 } }, grid: { display: false } }, y: { ticks: { font: { size: 10 }, precision: 0 }, grid: { color: 'rgba(82,37,102,0.06)' }, beginAtZero: true } } }
    })
  }

  // ——— Tabla: citas de hoy ————————————————————————————————
  let citasHoyArr = []
  const filtroEmp = document.getElementById('filtro-empleada-hoy')

  async function cargarCitasHoy() {
    const hoy = todayISO()
    const { data } = await supabase.from('citas')
      .select('id,fecha,hora_inicio,estado,notas,clientes(nombre,telefono),servicios(nombre,precio),empleados(id,nombre,apellido,foto_url)')
      .eq('fecha', hoy)
      .order('hora_inicio')
    citasHoyArr = data || []
    renderCitasHoy()
  }

  function renderCitasHoy() {
    const tbody = document.getElementById('citas-hoy-tbody')
    const emp   = filtroEmp.value
    const est   = document.getElementById('filtro-estado-hoy').value
    const arr   = citasHoyArr.filter(c =>
      (!emp || c.empleados?.id === emp) &&
      (!est || c.estado === est)
    )
    if (!arr.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-muted" style="text-align:center;padding:32px">No hay citas para los filtros seleccionados</td></tr>`
      return
    }
    tbody.innerHTML = arr.map(c => `
      <tr>
        <td style="font-weight:500">${formatHora(c.hora_inicio)}</td>
        <td>
          <div style="font-weight:500">${c.clientes?.nombre || '—'}</div>
          <div class="td-muted">${c.clientes?.telefono || ''}</div>
        </td>
        <td>${c.servicios?.nombre || '—'}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            ${avatarHTML(c.empleados?.nombre, c.empleados?.apellido, c.empleados?.foto_url, 26)}
            <span style="font-size:0.82rem">${c.empleados ? [c.empleados.nombre, c.empleados.apellido].filter(Boolean).join(' ') : '—'}</span>
          </div>
        </td>
        <td>${badgeCita(c.estado)}</td>
        <td>
          <div class="table-actions">
            <button class="action-btn" data-tooltip="Cambiar estado" onclick="abrirModalEstado('${c.id}','${(c.clientes?.nombre || '').replace(/'/g, '')}','${c.estado}')">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
        </td>
      </tr>
    `).join('')
  }

  filtroEmp.addEventListener('change', renderCitasHoy)
  document.getElementById('filtro-estado-hoy').addEventListener('change', renderCitasHoy)

  // ——— Tabla: próximas citas (hoy + 7 días) ————————————————
  async function cargarProximas() {
    const hoy = todayISO()
    const fin = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Bogota' }))
    fin.setDate(fin.getDate() + 7)
    const hasta = `${fin.getFullYear()}-${String(fin.getMonth() + 1).padStart(2, '0')}-${String(fin.getDate()).padStart(2, '0')}`

    const { data } = await supabase.from('citas')
      .select('id,fecha,hora_inicio,estado,clientes(nombre),servicios(nombre),empleados(nombre,apellido,foto_url)')
      .gte('fecha', hoy).lte('fecha', hasta)
      .not('estado', 'in', '(cancelada_cliente,cancelada_admin,no_asistio)')
      .order('fecha').order('hora_inicio')
      .limit(30)

    const agendaTbody = document.getElementById('agenda-semana-tbody')
    const arr = data || []
    if (!arr.length) {
      agendaTbody.innerHTML = `<tr><td colspan="6" class="text-muted" style="text-align:center;padding:32px">No hay citas próximas</td></tr>`
      return
    }
    agendaTbody.innerHTML = arr.map(c => `
      <tr>
        <td style="white-space:nowrap">${formatFechaCorta(c.fecha)}</td>
        <td style="font-weight:500">${formatHora(c.hora_inicio)}</td>
        <td>${c.clientes?.nombre || '—'}</td>
        <td>${c.servicios?.nombre || '—'}</td>
        <td>
          <div style="display:flex;align-items:center;gap:7px">
            ${avatarHTML(c.empleados?.nombre, c.empleados?.apellido, c.empleados?.foto_url, 24)}
            <span style="font-size:0.78rem">${c.empleados ? [c.empleados.nombre, c.empleados.apellido].filter(Boolean).join(' ') : '—'}</span>
          </div>
        </td>
        <td>${badgeCita(c.estado)}</td>
      </tr>
    `).join('')
  }

  // ——— Filtro de período ————————————————————————————————
  document.querySelectorAll('#periodo-filter button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.periodo === periodoActual) return
      periodoActual = btn.dataset.periodo
      document.querySelectorAll('#periodo-filter button').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      cargarPeriodo()
    })
  })

  // ——— Poblar filtro empleadas ————————————————————————————
  async function poblarEmpleadas() {
    const { data } = await supabase.from('empleados').select('id,nombre,apellido').eq('activo', true)
    ;(data || []).forEach(e => {
      const opt = document.createElement('option')
      opt.value = e.id
      opt.textContent = [e.nombre, e.apellido].filter(Boolean).join(' ')
      filtroEmp.appendChild(opt)
    })
  }

  // ——— Modal cambiar estado ——————————————————————————————
  let citaIdActual = null
  window.abrirModalEstado = (id, nombre, estadoActual) => {
    citaIdActual = id
    document.getElementById('modal-estado-nombre').textContent = nombre
    document.getElementById('select-nuevo-estado').value = estadoActual
    document.getElementById('nota-estado').value = ''
    openModal('modal-estado')
  }
  document.getElementById('modal-estado-close').addEventListener('click', () => closeModal('modal-estado'))
  document.getElementById('modal-estado-cancel').addEventListener('click', () => closeModal('modal-estado'))
  document.getElementById('modal-estado').addEventListener('click', e => {
    if (e.target.id === 'modal-estado') closeModal('modal-estado')
  })
  document.getElementById('modal-estado-save').addEventListener('click', async () => {
    const estado = document.getElementById('select-nuevo-estado').value
    const notas  = document.getElementById('nota-estado').value.trim()
    const upd    = { estado }
    if (notas) upd.notas = notas
    const { error } = await supabase.from('citas').update(upd).eq('id', citaIdActual)
    if (error) { toast('Error al actualizar', 'error'); return }
    closeModal('modal-estado')
    toast('Estado actualizado', 'success')
    const idx = citasHoyArr.findIndex(c => c.id === citaIdActual)
    if (idx !== -1) citasHoyArr[idx].estado = estado
    renderCitasHoy()
    cargarPeriodo()
  })

  // ——— Init ———————————————————————————————————————————————
  await Promise.all([poblarEmpleadas(), cargarPeriodo(), cargarChart30Dias(), cargarCitasHoy(), cargarProximas()])
</script>
</body>
</html>
