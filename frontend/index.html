<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serenità Admin — Ingreso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" stroke="var(--lilac)" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 12px"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <div class="login-title">Serenità Admin</div>
      <span class="login-subtitle">Panel de administración</span>
    </div>

    <div id="login-error" class="login-error"></div>

    <form id="login-form" class="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input id="email" type="email" class="form-input" placeholder="admin@serenitta.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div style="position:relative">
          <input id="password" type="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required style="padding-right:44px" />
          <button type="button" id="toggle-pass" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);transition:color 0.2s" aria-label="Mostrar contraseña">
            <svg id="eye-on" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-off" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="hidden"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" id="login-btn" class="login-btn" style="margin-top:20px">
        <span id="btn-text">Ingresar al panel</span>
        <span id="btn-loading" class="hidden" style="display:inline-flex;align-items:center;gap:8px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="spinning"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          Verificando…
        </span>
      </button>
    </form>

    <p style="text-align:center;margin-top:24px;font-size:0.65rem;color:rgba(255,255,255,0.2)">
      Acceso exclusivo para administradoras de Serenità Spa
    </p>
  </div>
</div>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<script type="module">
  import { login, redirectIfAdmin } from '/js/auth.js'

  redirectIfAdmin()

  const form   = document.getElementById('login-form')
  const errEl  = document.getElementById('login-error')
  const btn    = document.getElementById('login-btn')
  const btnTxt = document.getElementById('btn-text')
  const btnLdr = document.getElementById('btn-loading')

  document.getElementById('toggle-pass').addEventListener('click', () => {
    const inp = document.getElementById('password')
    const on  = document.getElementById('eye-on')
    const off = document.getElementById('eye-off')
    if (inp.type === 'password') {
      inp.type = 'text'
      on.classList.add('hidden')
      off.classList.remove('hidden')
    } else {
      inp.type = 'password'
      on.classList.remove('hidden')
      off.classList.add('hidden')
    }
  })

  form.addEventListener('submit', async e => {
    e.preventDefault()
    const email    = document.getElementById('email').value.trim().toLowerCase()
    const password = document.getElementById('password').value

    if (!email || !password) { showError('Completa todos los campos.'); return }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Ingresa un correo válido.'); return }
    if (password.length < 6) { showError('La contraseña debe tener al menos 6 caracteres.'); return }

    setLoading(true)
    try {
      await login(email, password)
      window.location.href = '/dashboard.html'
    } catch (err) {
      showError(err.message)
    } finally {
      setLoading(false)
    }
  })

  function showError(msg) {
    errEl.textContent = msg
    errEl.classList.add('show')
    setTimeout(() => errEl.classList.remove('show'), 6000)
  }
  function setLoading(on) {
    btn.disabled = on
    btnTxt.classList.toggle('hidden', on)
    btnLdr.classList.toggle('hidden', !on)
    btnLdr.style.display = on ? 'inline-flex' : 'none'
  }
</script>
</body>
</html>
